<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PALPITEIRO</title>

<style>
:root{
  --bg:#070b14;
  --card:#0d1630;
  --btn:#2a5cff;
}

*{box-sizing:border-box;}

body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(900px 600px at 20% 10%, #173166 0%, transparent 55%),
    radial-gradient(900px 600px at 90% 20%, #1d3fa0 0%, transparent 55%),
    linear-gradient(180deg, var(--bg), #050810);
  color:white;
  padding:20px;
}

.card{
  width:min(500px, 100%);
  background:rgba(13,22,48,.8);
  border-radius:20px;
  padding:25px;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}

h1{
  font-size:18px;
  margin-bottom:15px;
}

.painel{
  display:grid;
  gap:15px;
  margin-bottom:20px;
}

.numero{
  font-size:40px;
  font-weight:900;
  letter-spacing:5px;
  padding:15px;
  border-radius:15px;
  background:rgba(0,0,0,.3);
  text-shadow:
    0 0 8px rgba(106,168,255,.9),
    0 0 18px rgba(106,168,255,.6),
    0 0 35px rgba(106,168,255,.4);
  animation: brilho .7s ease;
}

@keyframes brilho{
  from{opacity:0; transform:scale(.8);}
  to{opacity:1; transform:scale(1);}
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:900;
  letter-spacing:1px;
  background:linear-gradient(180deg,#3a74ff,var(--btn));
  color:white;
  cursor:pointer;
  font-size:15px;
}

button:active{transform:translateY(1px);}
</style>
</head>

<body>

<div class="card">
  <h1>PALPITEIRO</h1>

  <div class="painel" id="painel">
    <div class="numero">0000</div>
    <div class="numero">0000</div>
    <div class="numero">0000</div>
    <div class="numero">0000</div>
    <div class="numero">0000</div>
  </div>

  <button onclick="gerar()">GERAR</button>
</div>

<script>
function pad4(n){
  return String(n).padStart(4,"0");
}

function gerar(){
  const numeros = document.querySelectorAll(".numero");

  numeros.forEach(el=>{
    const n = Math.floor(Math.random()*10000);
    el.textContent = pad4(n);

    // reinicia animação
    el.style.animation = "none";
    void el.offsetWidth;
    el.style.animation = "brilho .7s ease";
  });
}
</script>

</body>
</html>
