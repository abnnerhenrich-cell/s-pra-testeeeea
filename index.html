<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PALPITEIRO</title>
  <style>
    :root{
      --bg:#070b14;
      --card:#0d1630;
      --text:#e9f0ff;
      --btn:#2a5cff;
      --glow:#6aa8ff;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(900px 600px at 20% 10%, #173166 0%, transparent 55%),
        radial-gradient(900px 600px at 90% 20%, #1d3fa0 0%, transparent 55%),
        linear-gradient(180deg, var(--bg), #050810);
      color: var(--text);
      padding:24px;
    }

    .card{
      width:min(520px, 100%);
      background: rgba(13,22,48,.75);
      border:1px solid rgba(255,255,255,.10);
      border-radius:20px;
      padding:22px;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
      text-align:center;
    }

    h1{
      margin:0 0 14px;
      font-size:18px;
      font-weight:800;
      letter-spacing:.3px;
      opacity:.95;
    }

    .painel{
      margin:14px 0 18px;
      padding:24px 16px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.25);
      font-variant-numeric: tabular-nums;
      font-size:56px;
      font-weight:900;
      letter-spacing:6px;
      user-select:none;

      /* brilho */
      text-shadow:
        0 0 8px rgba(106,168,255,.85),
        0 0 18px rgba(106,168,255,.55),
        0 0 36px rgba(106,168,255,.35);
      color: #eaf3ff;
      position:relative;
      overflow:hidden;
    }

    /* efeito reluzente passando */
    .painel::before{
      content:"";
      position:absolute;
      top:-40%;
      left:-60%;
      width:60%;
      height:180%;
      background: linear-gradient(120deg,
        transparent 0%,
        rgba(255,255,255,.08) 35%,
        rgba(255,255,255,.35) 50%,
        rgba(255,255,255,.08) 65%,
        transparent 100%);
      transform: rotate(15deg);
      filter: blur(0.5px);
      opacity:.0;
    }

    .painel.anim::before{
      opacity:1;
      animation: shine .8s ease-out forwards;
    }

    @keyframes shine{
      from{ left:-70%; }
      to{ left:120%; }
    }

    button{
      width:100%;
      border:0;
      padding:14px 16px;
      border-radius:14px;
      font-weight:900;
      letter-spacing:.8px;
      cursor:pointer;
      color:white;
      background: linear-gradient(180deg, #3a74ff, var(--btn));
      box-shadow:
        0 10px 25px rgba(42,92,255,.35),
        0 0 0 1px rgba(255,255,255,.10) inset;
      transition: transform .06s ease, filter .15s ease;
    }
    button:active{ transform: translateY(1px); }
    button:hover{ filter: brightness(1.06); }

    .mini{
      margin-top:12px;
      font-size:12px;
      opacity:.75;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>PAPITEIRO</h1>

    <div id="painel" class="painel">0000</div>

    <button id="btn">GERAR</button>

    <div class="mini">Clique em GERAR criar seu palpite</div>
  </div>

  <script>
    const painel = document.getElementById("painel");
    const btn = document.getElementById("btn");

    function pad4(n){ return String(n).padStart(4, "0"); }

    btn.addEventListener("click", () => {
      const n = Math.floor(Math.random() * 10000);
      painel.textContent = pad4(n);

      // reinicia a animação do brilho
      painel.classList.remove("anim");
      void painel.offsetWidth; // força reflow
      painel.classList.add("anim");
    });
  </script>
</body>
</html>
